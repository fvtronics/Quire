name: Quire Pipeline

on:
  push:
    branches: ["main", "develop"]
    tags: ["v*"]
  pull_request:

env:
  CARGO_TERM_COLOR: always
  SONAR_USER_HOME: ${{ forgejo.workspace }}/.sonar

jobs:
  checks:
    name: Checks
    runs-on: fedora

    steps:
      - name: Checkout
        uses: https://data.forgejo.org/actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Cache Cargo
        uses: https://data.forgejo.org/actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: Generate Build Configuration
        run: meson setup builddir

      - name: Blueprint Check
        run: meson compile -C builddir blueprints

      - name: Format Check
        run: cargo fmt --all -- --check

      - name: Whitespace Check
        run: git diff --check

      - name: Clippy
        run: cargo clippy --locked --all-targets -- -D warnings

      - name: Test
        run: cargo test --locked

      - name: Generate Sonar Reports
        if: vars.SONAR_ENABLED == 'true' && forgejo.event_name == 'push' && startsWith(forgejo.ref, 'refs/heads/')
        run: |
          mkdir -p target/sonar
          cargo clippy --locked --message-format=json > target/sonar/clippy.json
          cargo llvm-cov --locked --lcov --output-path target/sonar/lcov.info

      - name: Upload Sonar Reports
        if: vars.SONAR_ENABLED == 'true' && forgejo.event_name == 'push' && startsWith(forgejo.ref, 'refs/heads/')
        uses: https://data.forgejo.org/actions/upload-artifact@v3
        with:
          name: sonar-reports
          path: target/sonar
          if-no-files-found: error
          retention-days: 1

  sonarqube:
    name: SonarQube Cloud
    needs: checks
    if: vars.SONAR_ENABLED == 'true' && forgejo.event_name == 'push' && startsWith(forgejo.ref, 'refs/heads/')
    runs-on: sonar

    steps:
      - name: Checkout
        uses: https://data.forgejo.org/actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Cache Sonar
        uses: https://data.forgejo.org/actions/cache@v4
        with:
          path: .sonar/cache
          key: ${{ runner.os }}-sonar
          restore-keys: |
            ${{ runner.os }}-sonar-

      - name: Download Sonar Reports
        uses: https://data.forgejo.org/actions/download-artifact@v3
        with:
          name: sonar-reports
          path: target/sonar

      - name: Prepare Sonar Cache
        run: mkdir -p "$FORGEJO_WORKSPACE/.sonar/cache"

      - name: SonarQube Cloud Scan
        run: |
          export SONAR_USER_HOME="$FORGEJO_WORKSPACE/.sonar"
          sonar-scanner
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: https://sonarcloud.io

  flatpak-bundle:
    name: Flatpak Bundle
    if: forgejo.event_name == 'push' && startsWith(forgejo.ref, 'refs/tags/v')
    runs-on: flatpak-builder

    steps:
      - name: Checkout
        uses: https://data.forgejo.org/actions/checkout@v4
        with:
          persist-credentials: false

      - name: Cache Flatpak Sources
        uses: https://data.forgejo.org/actions/cache@v4
        with:
          path: |
            .flatpak-builder/downloads
            .flatpak-builder/git
          key: ${{ runner.os }}-flatpak-sources-${{ hashFiles('com.fvtronics.Quire.json', 'cargo-sources.json', 'Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-flatpak-sources-

      - name: Cache Flatpak Builds
        uses: https://data.forgejo.org/actions/cache@v4
        with:
          path: .flatpak-builder/cache
          key: ${{ runner.os }}-flatpak-builds-${{ hashFiles('com.fvtronics.Quire.json', 'cargo-sources.json', 'Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-flatpak-builds-

      - name: Use Checkout Sources
        run: |
          python3 - <<'PY'
          import json
          from pathlib import Path

          manifest = Path("com.fvtronics.Quire.json")
          data = json.loads(manifest.read_text())

          for module in data["modules"]:
              if module.get("name") == "quire":
                  module["sources"][0] = {"type": "dir", "path": "."}
                  break

          manifest.write_text(json.dumps(data, indent="\t") + "\n")
          PY

      - name: Build Flatpak Bundle
        run: |
          flatpak-builder \
            --repo=repo \
            --disable-rofiles-fuse \
            --disable-updates \
            --force-clean \
            build-dir \
            com.fvtronics.Quire.json

          FLATPAK_BUNDLE="quire-${FORGEJO_REF#refs/tags/}.flatpak"
          flatpak build-bundle \
            repo \
            "$FLATPAK_BUNDLE" \
            --runtime-repo=https://flathub.org/repo/flathub.flatpakrepo \
            com.fvtronics.Quire
          echo "FLATPAK_BUNDLE=$FLATPAK_BUNDLE" >> "$FORGEJO_ENV"

      - name: Upload Flatpak Bundle
        uses: https://data.forgejo.org/actions/upload-artifact@v3
        with:
          name: flatpak-bundle
          path: quire-*.flatpak
          if-no-files-found: error
          retention-days: 1

  release:
    name: Create Forgejo Release
    needs: [checks, flatpak-bundle]
    if: forgejo.event_name == 'push' && startsWith(forgejo.ref, 'refs/tags/v')
    runs-on: linux-amd64

    steps:
      - name: Checkout
        uses: https://data.forgejo.org/actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Validate Release Version
        run: |
          VERSION="${FORGEJO_REF#refs/tags/v}"
          CARGO_VERSION="$(sed -n 's/^version = "\(.*\)"/\1/p' Cargo.toml | head -n 1)"
          MESON_VERSION="$(sed -n "s/^ *version: '\(.*\)',/\1/p" meson.build | head -n 1)"

          test "$VERSION" = "$CARGO_VERSION"
          test "$VERSION" = "$MESON_VERSION"
          grep -q "<release version=\"$VERSION\"" data/com.fvtronics.Quire.metainfo.xml.in

      - name: Validate App Metadata
        run: |
          python3 -m json.tool com.fvtronics.Quire.json >/dev/null
          python3 -m json.tool cargo-sources.json >/dev/null
          appstreamcli validate --no-net --explain data/com.fvtronics.Quire.metainfo.xml.in
          cp data/com.fvtronics.Quire.desktop.in /tmp/com.fvtronics.Quire.desktop
          desktop-file-validate /tmp/com.fvtronics.Quire.desktop

      - name: Download Flatpak Bundle
        uses: https://data.forgejo.org/actions/download-artifact@v3
        with:
          name: flatpak-bundle
          path: dist/release

      - name: Create Forgejo Release
        uses: https://data.forgejo.org/actions/forgejo-release@v2.12.1
        with:
          direction: upload
          release-dir: dist/release
          release-notes-file: CHANGELOG.md
