name: Folios Pipeline

on:
  push:
    branches: ["master"]
    tags: ["v*"]
  pull_request:

env:
  CARGO_TERM_COLOR: always

jobs:
  checks:
    name: Checks
    runs-on: fedora

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust
        uses: https://github.com/dtolnay/rust-toolchain@stable
        with:
          toolchain: stable
          components: clippy, rustfmt

      - name: Cache Cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: Generate Build Configuration
        run: meson setup builddir

      - name: Blueprint Check
        run: meson compile -C builddir blueprints

      - name: Format Check
        run: cargo fmt --all -- --check

      - name: Whitespace Check
        run: git diff --check

      - name: Clippy
        run: cargo clippy --locked --all-targets -- -D warnings

      - name: Test
        run: cargo test --locked

  release:
    name: Create Forgejo Release
    needs: checks
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')
    runs-on: fedora

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust
        uses: https://github.com/dtolnay/rust-toolchain@stable
        with:
          toolchain: stable

      - name: Cache Cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: Validate Release Version
        run: |
          VERSION="${GITHUB_REF#refs/tags/v}"
          CARGO_VERSION="$(sed -n 's/^version = "\(.*\)"/\1/p' Cargo.toml | head -n 1)"
          MESON_VERSION="$(sed -n "s/^ *version: '\(.*\)',/\1/p" meson.build | head -n 1)"

          test "$VERSION" = "$CARGO_VERSION"
          test "$VERSION" = "$MESON_VERSION"
          grep -q "<release version=\"$VERSION\"" data/com.fvtronics.folios.metainfo.xml.in

      - name: Validate App Metadata
        run: |
          python3 -m json.tool com.fvtronics.folios.json >/dev/null
          python3 -m json.tool cargo-sources.json >/dev/null
          appstreamcli validate --no-net --explain data/com.fvtronics.folios.metainfo.xml.in
          cp data/com.fvtronics.folios.desktop.in /tmp/com.fvtronics.folios.desktop
          desktop-file-validate /tmp/com.fvtronics.folios.desktop

      - name: Create Forgejo Release
        uses: https://github.com/softprops/action-gh-release@v2
        with:
          body_path: CHANGELOG.md
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
