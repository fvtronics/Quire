name: Quire Pipeline

on:
  push:
    branches: ["main", "develop"]
    tags: ["v*"]
  pull_request:

env:
  CARGO_TERM_COLOR: always
  SONAR_USER_HOME: ${{ github.workspace }}/.sonar

jobs:
  checks:
    name: Checks
    runs-on: fedora

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install Rust
        uses: https://github.com/dtolnay/rust-toolchain@stable
        with:
          toolchain: stable
          components: clippy, rustfmt

      - name: Cache Cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: Generate Build Configuration
        run: meson setup builddir

      - name: Blueprint Check
        run: meson compile -C builddir blueprints

      - name: Format Check
        run: cargo fmt --all -- --check

      - name: Whitespace Check
        run: git diff --check

      - name: Clippy
        run: cargo clippy --locked --all-targets -- -D warnings

      - name: Test
        run: cargo test --locked

      - name: Install Coverage Tool
        if: vars.SONAR_ENABLED == 'true' && github.event_name == 'push' && startsWith(github.ref, 'refs/heads/')
        run: cargo install cargo-llvm-cov --locked

      - name: Generate Sonar Reports
        if: vars.SONAR_ENABLED == 'true' && github.event_name == 'push' && startsWith(github.ref, 'refs/heads/')
        run: |
          mkdir -p target/sonar
          cargo clippy --locked --message-format=json > target/sonar/clippy.json
          cargo llvm-cov --locked --lcov --output-path target/sonar/lcov.info

      - name: Upload Sonar Reports
        if: vars.SONAR_ENABLED == 'true' && github.event_name == 'push' && startsWith(github.ref, 'refs/heads/')
        uses: actions/upload-artifact@v3
        with:
          name: sonar-reports
          path: target/sonar
          if-no-files-found: error
          retention-days: 1

  sonarqube:
    name: SonarQube Cloud
    needs: checks
    if: vars.SONAR_ENABLED == 'true' && github.event_name == 'push' && startsWith(github.ref, 'refs/heads/')
    runs-on: fedora
    container:
      image: sonarsource/sonar-scanner-cli:latest
      options: --entrypoint ""

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Cache Sonar
        uses: actions/cache@v4
        with:
          path: .sonar/cache
          key: ${{ runner.os }}-sonar
          restore-keys: |
            ${{ runner.os }}-sonar-

      - name: Download Sonar Reports
        uses: actions/download-artifact@v3
        with:
          name: sonar-reports
          path: target/sonar

      - name: Prepare Sonar Cache
        run: mkdir -p "$GITHUB_WORKSPACE/.sonar/cache"

      - name: SonarQube Cloud Scan
        run: |
          export SONAR_USER_HOME="$GITHUB_WORKSPACE/.sonar"
          sonar-scanner
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: https://sonarcloud.io

  flatpak-bundle:
    name: Flatpak Bundle
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')
    runs-on: fedora
    container:
      image: ghcr.io/flathub-infra/flatpak-github-actions:gnome-50

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Use Checkout Sources
        run: |
          python3 - <<'PY'
          import json
          from pathlib import Path

          manifest = Path("com.fvtronics.Quire.json")
          data = json.loads(manifest.read_text())

          for module in data["modules"]:
              if module.get("name") == "quire":
                  module["sources"][0] = {"type": "dir", "path": "."}
                  break

          manifest.write_text(json.dumps(data, indent="\t") + "\n")
          PY

      - name: Build Flatpak Bundle
        run: |
          flatpak remote-add --user --if-not-exists flathub https://flathub.org/repo/flathub.flatpakrepo
          flatpak-builder \
            --repo=repo \
            --user \
            --install-deps-from=flathub \
            --disable-rofiles-fuse \
            --disable-updates \
            --force-clean \
            build-dir \
            com.fvtronics.Quire.json

          FLATPAK_BUNDLE="quire-${GITHUB_REF#refs/tags/}.flatpak"
          flatpak build-bundle \
            repo \
            "$FLATPAK_BUNDLE" \
            --runtime-repo=https://flathub.org/repo/flathub.flatpakrepo \
            com.fvtronics.Quire
          echo "FLATPAK_BUNDLE=$FLATPAK_BUNDLE" >> "$GITHUB_ENV"

      - name: Upload Flatpak Bundle
        uses: actions/upload-artifact@v3
        with:
          name: flatpak-bundle
          path: quire-*.flatpak
          if-no-files-found: error
          retention-days: 1

  release:
    name: Create Forgejo Release
    needs: [checks, flatpak-bundle]
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')
    runs-on: fedora

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install Rust
        uses: https://github.com/dtolnay/rust-toolchain@stable
        with:
          toolchain: stable

      - name: Cache Cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: Validate Release Version
        run: |
          VERSION="${GITHUB_REF#refs/tags/v}"
          CARGO_VERSION="$(sed -n 's/^version = "\(.*\)"/\1/p' Cargo.toml | head -n 1)"
          MESON_VERSION="$(sed -n "s/^ *version: '\(.*\)',/\1/p" meson.build | head -n 1)"

          test "$VERSION" = "$CARGO_VERSION"
          test "$VERSION" = "$MESON_VERSION"
          grep -q "<release version=\"$VERSION\"" data/com.fvtronics.Quire.metainfo.xml.in

      - name: Validate App Metadata
        run: |
          python3 -m json.tool com.fvtronics.Quire.json >/dev/null
          python3 -m json.tool cargo-sources.json >/dev/null
          appstreamcli validate --no-net --explain data/com.fvtronics.Quire.metainfo.xml.in
          cp data/com.fvtronics.Quire.desktop.in /tmp/com.fvtronics.Quire.desktop
          desktop-file-validate /tmp/com.fvtronics.Quire.desktop

      - name: Download Flatpak Bundle
        uses: actions/download-artifact@v3
        with:
          name: flatpak-bundle
          path: .

      - name: Create Forgejo Release
        uses: https://github.com/softprops/action-gh-release@v2
        with:
          body_path: CHANGELOG.md
          files: quire-*.flatpak
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
