workflow:
  rules:
    - if: '$CI_COMMIT_TAG =~ /^v/'
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'
    - if: '$CI_PIPELINE_SOURCE == "push" && $CI_COMMIT_BRANCH == "master"'
    - if: '$CI_PIPELINE_SOURCE == "push" && $CI_COMMIT_BRANCH == "develop"'
    - when: never

variables:
  SONAR_USER_HOME: "${CI_PROJECT_DIR}/.sonar"
  GIT_DEPTH: "0"

stages:
  - quality
  - package
  - release

rust-coverage:
  stage: quality
  image: fedora:44
  variables:
    CARGO_HOME: "${CI_PROJECT_DIR}/.cargo"
  cache:
    key: "${CI_JOB_NAME}"
    paths:
      - target/
      - .cargo/
  before_script:
    - dnf install -y cargo rust llvm gcc pkgconf-pkg-config gtk4-devel libadwaita-devel poppler-glib-devel
    - dnf clean all
    - export PATH="${CARGO_HOME}/bin:$PATH"
    - cargo install cargo-llvm-cov --locked
  script:
    - mkdir -p target/sonar
    - cargo llvm-cov --locked --lcov --output-path target/sonar/lcov.info
  artifacts:
    paths:
      - target/sonar/lcov.info
    expire_in: 1 week
  rules:
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'
    - if: '$CI_PIPELINE_SOURCE == "push" && $CI_COMMIT_BRANCH == "master"'
    - if: '$CI_PIPELINE_SOURCE == "push" && $CI_COMMIT_BRANCH == "develop"'

sonarcloud-check:
  stage: quality
  image:
    name: sonarsource/sonar-scanner-cli:latest
    entrypoint: [""]
  needs:
    - job: rust-coverage
      artifacts: true
  cache:
    key: "${CI_JOB_NAME}"
    paths:
      - .sonar/cache
  script:
    - sonar-scanner
  rules:
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'
    - if: '$CI_PIPELINE_SOURCE == "push" && $CI_COMMIT_BRANCH == "master"'
    - if: '$CI_PIPELINE_SOURCE == "push" && $CI_COMMIT_BRANCH == "develop"'

flatpak_bundle:
  stage: package
  image: ghcr.io/flathub-infra/flatpak-github-actions:gnome-50
  script:
    - flatpak remote-add --user --if-not-exists flathub https://flathub.org/repo/flathub.flatpakrepo
    - |
      flatpak-builder \
        --repo=repo \
        --user \
        --install-deps-from=flathub \
        --disable-rofiles-fuse \
        --disable-updates \
        --force-clean \
        build-dir \
        com.fvtronics.folios.json
    - |
      FLATPAK_BUNDLE="folios-${CI_COMMIT_TAG}.flatpak"
      flatpak build-bundle \
        repo \
        "$FLATPAK_BUNDLE" \
        --runtime-repo=https://flathub.org/repo/flathub.flatpakrepo \
        com.fvtronics.folios
      echo "FLATPAK_BUNDLE_URL=$CI_PROJECT_URL/-/jobs/$CI_JOB_ID/artifacts/file/$FLATPAK_BUNDLE" > flatpak.env
  artifacts:
    paths:
      - folios-$CI_COMMIT_TAG.flatpak
    reports:
      dotenv: flatpak.env
    expire_in: never
  rules:
    - if: '$CI_COMMIT_TAG =~ /^v/'

release:
  stage: release
  image: registry.gitlab.com/gitlab-org/cli:latest
  needs:
    - job: flatpak_bundle
      artifacts: true
  before_script:
    - apk add --no-cache appstream desktop-file-utils python3
  script:
    - |
      VERSION="${CI_COMMIT_TAG#v}"
      CARGO_VERSION="$(sed -n 's/^version = "\(.*\)"/\1/p' Cargo.toml | head -n 1)"
      MESON_VERSION="$(sed -n "s/^ *version: '\(.*\)',/\1/p" meson.build | head -n 1)"

      test "$VERSION" = "$CARGO_VERSION"
      test "$VERSION" = "$MESON_VERSION"
      grep -q "<release version=\"$VERSION\"" data/com.fvtronics.folios.metainfo.xml.in
    - |
      python3 -m json.tool com.fvtronics.folios.json >/dev/null
      python3 -m json.tool cargo-sources.json >/dev/null
      appstreamcli validate --no-net --explain data/com.fvtronics.folios.metainfo.xml.in
      cp data/com.fvtronics.folios.desktop.in /tmp/com.fvtronics.folios.desktop
      desktop-file-validate /tmp/com.fvtronics.folios.desktop
  release:
    tag_name: $CI_COMMIT_TAG
    description: './CHANGELOG.md'
    assets:
      links:
        - name: "Flatpak bundle"
          url: "$FLATPAK_BUNDLE_URL"
          filepath: "/folios-$CI_COMMIT_TAG.flatpak"
          link_type: package
  rules:
    - if: '$CI_COMMIT_TAG =~ /^v/'
